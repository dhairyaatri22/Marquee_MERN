<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Physical Form</title>

 <link rel="stylesheet" href="form1.css">
</head>

<body>
  <div class="container">
    <h1>Sports Physical Form</h1>
    <p class="subtitle">Complete athlete, medical, and participation details</p>

    <form action="actionpage.html" method="post" >

      <fieldset>
        <legend>Athlete Information</legend>

        <div class="grid">
          <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" name="username" id="name" placeholder="Enter your name" required />
          </div>

          <div class="form-group">
            <label for="school">School/Team:</label>
            <input type="text" name="school" id="school" required />
          </div>

          <div class="form-group">
            <label for="sport">Sport:</label>
            <input type="text" name="sport" id="sport" required />
          </div>

          <div class="form-group">
            <label for="parent">Parent/Guardian Name:</label>
            <input type="text" name="parent" id="parent" required />
          </div>

          <div class="form-group full">
            <label for="number">Contact Number:</label>
            <input type="tel" name="number" id="number" required />
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Medical History</legend>

        <p class="option-title">History of Concussions:</p>
        <div class="option-box">
          <input type="radio" name="history_concussion" id="concussion_yes" value="yes" />
          <label for="concussion_yes">Yes</label>

          <input type="radio" name="history_concussion" id="concussion_no" value="no" />
          <label for="concussion_no">No</label>
        </div>

        <div class="grid">
          <div class="form-group full">
            <label for="prev_surgery">Previous Surgeries:</label>
            <input type="text" name="prev_surgery" id="prev_surgery" />
          </div>
        </div>

        <p class="option-title">Any Bone Fractures:</p>
        <div class="option-box">
          <input type="radio" name="bone_frac" id="bone_frac_yes" value="yes" />
          <label for="bone_frac_yes">Yes</label>

          <input type="radio" name="bone_frac" id="bone_frac_no" value="no" />
          <label for="bone_frac_no">No</label>
        </div>

        <p class="option-title">Asthma or Breathing Problem:</p>
        <div class="option-box">
          <input type="radio" name="problem_breathing" id="breathing_yes" value="yes" />
          <label for="breathing_yes">Yes</label>

          <input type="radio" name="problem_breathing" id="breathing_no" value="no" />
          <label for="breathing_no">No</label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Doctor's Recommendation</legend>

        <p class="option-title">Cleared for Sports:</p>
        <div class="option-box">
          <input type="radio" name="clear" id="clear_yes" value="yes" />
          <label for="clear_yes">Yes</label>

          <input type="radio" name="clear" id="clear_no" value="no" />
          <label for="clear_no">No</label>
        </div>

        <div class="grid">
          <div class="form-group">
            <label for="reason">If not cleared, reason:</label>
            <input type="text" name="reason" id="reason" placeholder="Enter reason if not cleared" />
          </div>

          <div class="form-group">
            <label for="sig">Physician Signature:</label>
            <input type="text" name="signature" id="sig" />
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Department & Hobbies</legend>

        <div class="grid">
          <div class="form-group">
            <label for="department_name">Select Department:</label>
            <select id="department_name" name="department_name" required>
              <option value="">Select your Department</option>
              <option value="AIML">AIML</option>
              <option value="CSE">CSE</option>
              <option value="AIDS">AIDS</option>
            </select>
          </div>

          <div>
            <p class="option-title">Hobbies:</p>
            <div class="option-box">
              <input type="checkbox" id="cricket" name="hobbies" value="cricket" />
              <label for="cricket">Cricket</label>

              <input type="checkbox" id="football" name="hobbies" value="football" />
              <label for="football">Football</label>

              <input type="checkbox" id="music" name="hobbies" value="music" />
              <label for="music">Music</label>
            </div>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Address</legend>

        <div class="form-group">
          <label for="address">Address:</label>
          <textarea name="address" id="address" placeholder="Enter your address"></textarea>
        </div>
      </fieldset>

      <fieldset>
        <legend>General Information</legend>

        <div class="grid">
          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required />
          </div>

          <div class="form-group">
            <label for="passwrd">Password:</label>
            <input type="password" name="passwrd" id="passwrd" required />
          </div>

          <div class="form-group">
            <label for="num">Secondary Number:</label>
            <input type="tel" name="num" id="num" />
          </div>

          <div class="form-group">
            <label for="date">Date:</label>
            <input type="datetime-local" id="date" name="date" />
          </div>

          <div class="form-group">
            <label for="profile_pic">Profile:</label>
            <input type="file" name="profile_pic" id="profile_pic" accept=".jpg,.png,.jpeg" />
          </div>

          <div class="form-group">
            <label for="resume">Resume:</label>
            <input type="file" name="resume" id="resume" accept=".pdf" />
          </div>

          <div class="form-group">
            <label for="word_file">Word File:</label>
            <input type="file" name="word_file" id="word_file" accept=".doc,.docx" />
          </div>

          <div class="form-group">
            <label for="excel_sheet">Excel File:</label>
            <input type="file" name="excel_sheet" id="excel_sheet" accept=".xls,.xlsx" />
          </div>
        </div>
      </fieldset>

      <div class="btn-group">
        <input type="reset" value="Reset" />
        <input type="submit" value="Submit Form" />
      </div>

    </form>
  </div>
</body>

</html>
