<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        ul,p {
            color: rgb(253, 67, 67);
            font-family: Arial, Helvetica, sans-serif;
        }
        .formatting{
            color: rgb(127, 87, 245);
        }
        li:hover{
            border: 2px solid rgb(6, 6, 6);
            width: 300px;
            padding: 10px;
            cursor: cursor;
            transform: scale(1.04);
            transition: 0.4s;
            background-color: rgb(193, 252, 193);
            border-radius: 10px;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h3>Types of CSS</h3>
    <p> lorem ipsum dolor sit amet, consectetur adipiscing elit. </p>
    <ul>
        <li style="color: rgb(254, 3, 3);">inline CSS</li>
        <li class ="formatting" style="color: brown;">internal CSS</li>
        <li class ="formatting">external CSS</li>
    </ul>
</body>
</html>
