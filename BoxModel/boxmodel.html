<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Model</title>
     <link rel="stylesheet" href="boxmodel.css">

</head>

<body>
    <div class="title">
        <h1>Box Model</h1>
    </div>

    <div class="box">
        Every element on the page has its own box, which can be styled using
        CSS...
    </div>

    <div class="box">From the inside out:</div>

    <ul>
        <li class="formate">content</li>
        <li >padding</li>
        <li class="formate">border</li>
        <li>margin</li>
    </ul>

    <br /><br />

    <h1>Background</h1>

    <div class="box">
        Keep in mind that a
        <span class="highlight">background</span>
        will cover the content and the padding.
    </div>
</body>

</html>
